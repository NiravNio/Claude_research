name: Daily AI Updates Research

on:
  schedule:
    - cron: '30 15 * * *'  # 8:30 PM IST (3:00 PM UTC) every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install anthropic PyGithub
      
      - name: Research AI updates with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/ai-updates-research.py
      
      - name: Commit and push changes
        run: |
          git config user.name "AI Updates Bot - Nirav"
          git config user.email "nirav@niodbp.com"
          git pull origin main --ff-only
          git add .
          git commit -m "Daily AI updates - $(date +%Y-%m-%d)" || true
          git push origin main
